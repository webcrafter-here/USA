backend:
  name: git-gateway
  branch: main

media_folder: "images"

collections:
  - name: "site"
    label: "Edit Website"
    files:
      - label: "General Info"
        name: "general"
        file: "site-content.json"
        fields:
          - {label: "Hero Title", name: "hero_title", widget: "string"}
          - {label: "Phone Number", name: "phone", widget: "string"}
          - {label: "Address", name: "address", widget: "string"}
          - {label: "Opening Hours", name: "hours", widget: "string"}
